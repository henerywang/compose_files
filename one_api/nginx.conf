events {
    worker_connections 1024;
}

http {
    server {
        # 1. 监听 8080 端口，接收来自 LiteLLM 的纯 HTTP 明文请求
        listen 8080;

        location / {
            # 2. 将 HTTP 转化为 HTTPS，转发给真实的底层网关
            proxy_pass https://www.fusiononecenter.xfusion.com;

            # --- 【核心：自签证书配置】 ---
            proxy_ssl_verify off; # 开启对上游网关的严格证书校验
            proxy_ssl_server_name on;

            # --- 【核心：清洗脏请求头】 ---
            proxy_hide_header Content-Security-Policy;
            proxy_hide_header content-security-policy;

            # --- 保留原始 Host 信息，防止被防火墙拦截 ---
            proxy_set_header Host www.fusiononecenter.xfusion.com;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }
}